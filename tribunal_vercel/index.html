<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tribunal TFM — Health Analytics</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
:root{--black:#0a0a0a;--amber:#d4820a;--amber-dim:#6a4200;--surface:#111;--surface2:#181818;--border:#2a2a2a;--text:#e0d8c8;--dim:#6a6050;--red:#c0392b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
header{border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:baseline;gap:14px}
.h1{font-family:'Playfair Display',serif;font-size:1rem;font-weight:400;color:var(--amber)}
.sub{font-size:.68rem;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;font-family:monospace}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
.tab{flex:1;padding:13px;background:none;border:none;border-right:1px solid var(--border);color:var(--dim);font-family:monospace;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.tab:last-child{border-right:none}
.tab.active{color:var(--amber);background:rgba(212,130,10,.08)}
.main{max-width:820px;margin:0 auto;padding:28px;display:flex;flex-direction:column;gap:20px;width:100%}
.panel{display:none}.panel.active{display:flex;flex-direction:column;gap:20px}
/* MIC */
.mic-zone{display:flex;flex-direction:column;align-items:center;gap:14px;padding:36px 20px;border:1px solid var(--border);background:var(--surface);border-radius:2px}
.mic-btn{width:80px;height:80px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);color:var(--dim);font-size:1.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mic-btn.listening{border-color:var(--red);color:var(--red);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.3)}50%{box-shadow:0 0 0 14px rgba(192,57,43,0)}}
.mic-lbl{font-family:monospace;font-size:.65rem;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.mic-lbl.on{color:var(--red)}
/* BOXES */
.box{padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:2px}
.lbl{font-family:monospace;font-size:.62rem;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.transcript{font-size:.9rem;line-height:1.6;color:var(--text);font-style:italic;min-height:22px}
.transcript.empty{color:var(--dim);font-style:normal}
.resp-box{border:1px solid var(--amber-dim);background:rgba(212,130,10,.04);border-radius:2px}
.resp-hdr{padding:10px 18px;border-bottom:1px solid var(--amber-dim);background:rgba(212,130,10,.06)}
.resp-lbl{font-family:monospace;font-size:.62rem;color:var(--amber);letter-spacing:.1em;text-transform:uppercase}
.resp-cnt{padding:18px 20px;font-size:.9rem;line-height:1.8;min-height:60px}
.resp-cnt.empty{color:var(--dim)}
.resp-cnt.loading{color:var(--dim);font-style:italic}
/* PRACTICE */
.topics{display:flex;flex-wrap:wrap;gap:6px}
.tbtn{padding:7px 13px;background:var(--surface);border:1px solid var(--border);color:var(--dim);font-family:'IBM Plex Sans',sans-serif;font-size:.75rem;cursor:pointer;border-radius:2px;transition:all .15s}
.tbtn.active{border-color:var(--amber);color:var(--amber);background:rgba(212,130,10,.1)}
.gbtn{padding:11px 22px;background:var(--amber);color:var(--black);border:none;font-family:monospace;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;font-weight:500;cursor:pointer;border-radius:2px}
.gbtn:disabled{background:var(--dim);cursor:not-allowed}
.q-box{padding:18px 20px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:2px}
.q-lbl{font-family:monospace;font-size:.62rem;color:var(--amber-dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.q-txt{font-family:'Playfair Display',serif;font-size:1rem;line-height:1.5}
.hist-item{padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:2px;font-size:.82rem;line-height:1.65}
.hist-q{font-family:monospace;font-size:.62rem;color:var(--amber-dim);margin-bottom:5px}
/* SPINNER */
.sp{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:#e07060}
</style>
</head>
<body>
<header>
  <span class="h1">Tribunal TFM</span>
  <span class="sub">Health Analytics &middot; Determinantes Globales de la Esperanza de Vida</span>
</header>
<div class="tabs">
  <button class="tab active" onclick="setTab('listen')">&#127908; Defensa en vivo</button>
  <button class="tab" onclick="setTab('practice')">&#9889; Practica</button>
</div>
<div class="main">

  <div id="panel-listen" class="panel active">
    <div class="mic-zone">
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()">&#127908;</button>
      <span class="mic-lbl" id="mic-lbl">Pulsa para escuchar la pregunta</span>
    </div>
    <div class="box" style="display:flex;gap:8px;align-items:flex-start">
      <textarea id="transcript" placeholder="Transcripcion editable — corrige si es necesario y pulsa Enviar" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendTranscript()}" style="flex:1;background:none;border:none;color:#e0d8c8;font-family:'IBM Plex Sans',sans-serif;font-size:.9rem;line-height:1.6;resize:none;outline:none;min-height:48px;font-style:italic"></textarea>
      <button onclick="sendTranscript()" style="padding:8px 14px;background:#d4820a;color:#0a0a0a;border:none;font-family:monospace;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;font-weight:500;cursor:pointer;border-radius:2px;white-space:nowrap;align-self:flex-end">Enviar</button>
    </div>
    <div class="resp-box">
      <div class="resp-hdr"><span class="resp-lbl">Respuesta sugerida</span></div>
      <div class="resp-cnt empty" id="live-resp">La respuesta aparecera aqui.</div>
    </div>
  </div>

  <div id="panel-practice" class="panel">
    <div>
      <div class="lbl" style="margin-bottom:10px">Filtrar por bloque</div>
      <div class="topics" id="topics"></div>
    </div>
    <button class="gbtn" id="gbtn" onclick="genQ()">Lanzar pregunta</button>
    <div class="q-box" id="q-box" style="display:none">
      <div class="q-lbl">Pregunta del tribunal</div>
      <div class="q-txt" id="q-txt"></div>
    </div>
    <div class="resp-box" id="p-resp-box" style="display:none">
      <div class="resp-hdr"><span class="resp-lbl">Respuesta</span></div>
      <div class="resp-cnt" id="p-resp"></div>
    </div>
    <div id="hist"></div>
  </div>

</div>
<script>
var TOPICS=[{id:'all',label:'Todos'},{id:'datos',label:'Datos'},{id:'descriptivos',label:'Descriptivos'},{id:'ml',label:'ML/SHAP'},{id:'twfe',label:'TWFE'},{id:'frontier',label:'Frontier'},{id:'did',label:'DiD'},{id:'lags',label:'Lags'},{id:'interacciones',label:'Interacciones'},{id:'limitaciones',label:'Limitaciones'},{id:'recomendaciones',label:'Recomendaciones'}];
var QS={
  datos:["Por que 40 paises y no una muestra mas amplia?","Como justificas el uso de KNN para imputar datos faltantes?","El periodo 2000-2019 introduce algun sesgo de seleccion temporal?","Que criterios usaste para clasificar los paises en desarrollados, emergentes y en desarrollo?","Como afecta la reduccion de 800 a 418 observaciones a la validez de los resultados ML?","Por que usas left joins sobre esperanza de vida como tabla base?"],
  descriptivos:["Por que la vacunacion en emergentes supera a la de desarrollados?","Como explicas que el homicidio en emergentes doble al de paises en desarrollo?","Que significa que la SD global haya caido de 9,6 a 6,4 anos?","Por que el gasto sanitario medio en paises en desarrollo es solo el 1,2% del GDP?","Los promedios nacionales ocultan desigualdad interna relevante?"],
  ml:["Un R2 de 0,986 parece demasiado alto. Como descartas overfitting?","Por que elegiste Gradient Boosting y no un modelo mas interpretable?","Que significa exactamente la importancia SHAP del 54,8% de la pobreza?","Estas confundiendo poder predictivo con explicacion causal en el modelo ML?","Por que la vacunacion tiene solo un 4,1% de importancia SHAP si su correlacion es 0,446?","Por que el gasto sanitario tiene solo un 2,8% de importancia SHAP?"],
  twfe:["Como interpretas que el gasto sanitario tenga coeficiente negativo en el TWFE?","Que eliminas exactamente al anadir controles por pais y por ano?","El TWFE establece causalidad o solo reduce sesgos?","Por que el R2 sube de 0,86 a 0,99 al anadir los efectos fijos?","Que variables omitidas podrian seguir sesgando el estimador TWFE?"],
  frontier:["Por que llamas eficiencia a un residuo de regresion lineal?","Por que Noruega aparece con gap negativo si tiene un sistema excelente?","Que tienen en comun Chile, Vietnam y Tailandia?","El gap de EEUU de -5,4 anos significa que su sistema es ineficiente?","Una regresion lineal es adecuada si la relacion GDP-salud es log-lineal?"],
  did:["Como verificaste el supuesto de tendencias paralelas?","Por que el DiD no alcanza significacion estadistica al 5% si el efecto es +1,6 anos?","Puedes generalizar el efecto de Tailandia a otros paises?","Por que elegiste esos seis paises como grupo control?","Que valida exactamente el test placebo?","Por que excluiste Indonesia del grupo control?"],
  lags:["Por que el lag maximo es de ocho anos y no mayor?","Este analisis de lags es correlacion desplazada o modelo dinamico causal?","Por que GDP y gasto tienen un perfil de lag casi plano?","Como sabes que el lag de ocho anos en vacunacion no es espurio?","Que implicacion tiene el lag de ocho anos para la evaluacion de politicas sanitarias?"],
  interacciones:["Por que el coeficiente del gasto en paises en desarrollo es -1,72?","Que explica el suicidio si los indicadores de desarrollo no funcionan?","Que nos dice el impacto de la crisis de 2008 sobre el mecanismo del gasto?","Por que el efecto del gasto en paises desarrollados es practicamente cero?","Que significa que el suicidio tenga R2=0,03?"],
  limitaciones:["Cual es la mayor debilidad de este trabajo?","Por que no incluiste variables de educacion o calidad institucional?","Como afecta el supuesto de tendencias paralelas a la validez del DiD?","El sesgo de seleccion en los missings podria invertir tus conclusiones?","Que efectos de largo plazo deja fuera el lag maximo de ocho anos?"],
  recomendaciones:["Por que recomiendas no perseguir vacunacion por encima del 95%?","El +10 anos por pasar al rango 2-4% del GDP es un efecto causal?","Como justificas recomendar el modelo de Tailandia si el DiD no es significativo al 5%?","Por que evaluar las politicas a horizonte minimo de ocho anos?","Por que la politica de salud mental debe ser independiente?"]
};

async function askClaude(question) {
  var base = window.location.origin;
  var resp = await fetch(base + '/api/answer', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({question: question})
  });
  var data = await resp.json();
  if (!resp.ok) throw new Error(data.error || resp.statusText);
  return data.answer || 'Sin respuesta.';
}

var tab='listen', topic='all', listening=false, rec=null, history=[];

function setTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach(function(b,i){b.classList.toggle('active',(i===0&&t==='listen')||(i===1&&t==='practice'));});
  document.getElementById('panel-listen').classList.toggle('active',t==='listen');
  document.getElementById('panel-practice').classList.toggle('active',t==='practice');
}

function sendTranscript(){
  var q=document.getElementById('transcript').value.trim();
  if(!q)return;
  answerLive(q);
}

function sendManual(){
  var el=document.getElementById('manual-input');
  var q=el.value.trim();
  if(!q)return;
  setT(q,false);
  el.value='';
  answerLive(q);
}

function toggleMic(){ listening?stopMic():startMic(); }

function startMic(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setT('Necesitas Chrome',true);return;}
  rec=new SR();rec.lang='es-ES';rec.continuous=false;rec.interimResults=true;
  var fin='';
  rec.onresult=function(e){fin=Array.from(e.results).map(function(r){return r[0].transcript;}).join('');setT(fin,false);};
  rec.onend=function(){stopMic();if(fin&&fin.trim().length>3)answerLive(fin);};
  rec.onerror=function(){stopMic();};
  rec.start();listening=true;
  document.getElementById('mic-btn').classList.add('listening');
  document.getElementById('mic-btn').textContent='Stop';
  document.getElementById('mic-lbl').textContent='Escuchando...';
  document.getElementById('mic-lbl').classList.add('on');
}

function stopMic(){
  listening=false;if(rec)rec.stop();
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('mic-btn').textContent='\uD83C\uDF08';
  document.getElementById('mic-btn').innerHTML='&#127908;';
  document.getElementById('mic-lbl').textContent='Pulsa para escuchar la pregunta';
  document.getElementById('mic-lbl').classList.remove('on');
}

function setT(t,empty){
  var el=document.getElementById('transcript');
  el.value=empty?'':t;
}

async function answerLive(q){
  var el=document.getElementById('live-resp');
  el.innerHTML='<span class="sp"></span>Consultando...';el.className='resp-cnt loading';
  try{var a=await askClaude(q);el.textContent=a;el.className='resp-cnt';}
  catch(e){el.innerHTML='<span class="err">Error: '+e.message+'</span>';el.className='resp-cnt';}
}

function buildTopics(){
  var c=document.getElementById('topics');
  TOPICS.forEach(function(t){
    var b=document.createElement('button');
    b.className='tbtn'+(t.id==='all'?' active':'');
    b.textContent=t.label;
    b.onclick=function(){topic=t.id;document.querySelectorAll('.tbtn').forEach(function(x){x.classList.remove('active');});b.classList.add('active');};
    c.appendChild(b);
  });
}

async function genQ(){
  var pool=topic==='all'?Object.values(QS).flat():(QS[topic]||[]);
  if(!pool.length)return;
  var q=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('q-box').style.display='block';
  document.getElementById('q-txt').textContent=q;
  document.getElementById('p-resp-box').style.display='block';
  var el=document.getElementById('p-resp');
  el.innerHTML='<span class="sp"></span>Consultando...';el.className='resp-cnt loading';
  document.getElementById('gbtn').disabled=true;
  try{
    var a=await askClaude(q);
    el.textContent=a;el.className='resp-cnt';
    history.unshift({q:q,a:a});renderHist();
  }catch(e){el.innerHTML='<span class="err">Error: '+e.message+'</span>';el.className='resp-cnt';}
  document.getElementById('gbtn').disabled=false;
}

function renderHist(){
  document.getElementById('hist').innerHTML=history.slice(1,6).map(function(i){
    return '<div class="hist-item"><div class="hist-q">Q: '+i.q+'</div><div>'+i.a+'</div></div>';
  }).join('');
}

buildTopics();
</script>
</body>
</html>
